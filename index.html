<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Reach — เกมฝึกการเคลื่อนไหว</title>
    <style>
        :root {
            --ink: #0f1b2d;
            --ink-2: #16263d;
            --paper: #f5f1e8;
            --pulse: #e0533d;
            --pulse-soft: #f4a698;
            --green: #2f9e7e;
            --green-soft: #6fcfae;
            --red: #d64545;
            --amber: #e0a93d;
            --blue: #4a7fd6;
            --line: rgba(245, 241, 232, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--ink);
        }

        body {
            font-family: ui-rounded, "Hiragino Maru Gothic ProN", "Noto Sans Thai", system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--paper);
        }

        #stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #cam,
        #canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #canvas {
            z-index: 2;
        }

        #cam {
            z-index: 1;
            filter: saturate(0.6) brightness(0.65);
        }

        #stage::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 1;
            background: radial-gradient(ellipse at center, transparent 35%, rgba(15, 27, 45, 0.5) 100%);
            pointer-events: none;
        }

        /* ===== top HUD during play ===== */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 5;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: env(safe-area-inset-top, 14px) 18px 0;
            pointer-events: none;
        }

        .panel {
            margin-top: 14px;
            background: rgba(15, 27, 45, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 10px 18px;
        }

        .panel.center {
            text-align: center;
        }

        .label {
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            opacity: 0.55;
        }

        .value {
            font-size: 30px;
            font-weight: 700;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
        }

        .value small {
            font-size: 14px;
            font-weight: 500;
            opacity: 0.6;
        }

        .value.warn {
            color: var(--amber);
        }

        .value.p1 {
            color: var(--green-soft);
        }

        .value.p2 {
            color: var(--pulse-soft);
        }

        #ctrlBtns {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 18px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 6;
            display: flex;
            gap: 12px;
        }

        .ctrl {
            pointer-events: auto;
            border: 1px solid var(--line);
            background: rgba(15, 27, 45, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--paper);
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            padding: 13px 26px;
            border-radius: 999px;
            cursor: pointer;
            transition: transform 0.12s;
        }

        .ctrl:active {
            transform: scale(0.95);
        }

        .ctrl.finish {
            background: var(--green);
            border-color: transparent;
        }

        .ctrl.cancel {
            background: rgba(214, 69, 69, 0.85);
            border-color: transparent;
        }

        /* ===== overlay screens (menu / summary) ===== */
        .screen {
            position: absolute;
            inset: 0;
            z-index: 20;
            background: var(--ink);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px;
            overflow-y: auto;
        }

        .screen-inner {
            width: 100%;
            max-width: 480px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 6px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            opacity: 0.6;
            font-size: 14px;
            margin-bottom: 26px;
            line-height: 1.5;
        }

        .group {
            margin-bottom: 22px;
        }

        .group>.glabel {
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0.5;
            margin-bottom: 10px;
        }

        .opts {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .opt {
            flex: 1;
            min-width: 0;
            border: 1px solid var(--line);
            background: var(--ink-2);
            color: var(--paper);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            padding: 14px 10px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .opt small {
            display: block;
            font-weight: 400;
            font-size: 11px;
            opacity: 0.55;
            margin-top: 3px;
            white-space: normal;
        }

        .opt.active {
            border-color: var(--pulse);
            background: rgba(224, 83, 61, 0.15);
        }

        .opt:active {
            transform: scale(0.97);
        }

        .timeRow {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .timeRow input[type=range] {
            flex: 1;
            accent-color: var(--pulse);
            height: 6px;
        }

        .timeRow .tval {
            font-size: 22px;
            font-weight: 700;
            min-width: 90px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .timeRow .tval small {
            font-size: 13px;
            font-weight: 500;
            opacity: 0.6;
        }

        .bigBtn {
            width: 100%;
            margin-top: 8px;
            background: var(--pulse);
            color: var(--paper);
            border: none;
            border-radius: 999px;
            font-size: 19px;
            font-weight: 700;
            font-family: inherit;
            padding: 18px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(224, 83, 61, 0.4);
            transition: transform 0.15s;
        }

        .bigBtn:active {
            transform: scale(0.97);
        }

        .bigBtn.secondary {
            background: var(--ink-2);
            border: 1px solid var(--line);
            box-shadow: none;
            margin-top: 12px;
        }

        /* ===== summary ===== */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 8px 0 24px;
        }

        .stat-grid.solo {
            grid-template-columns: 1fr 1fr;
        }

        .stat {
            background: var(--ink-2);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 18px;
            text-align: center;
        }

        .stat .num {
            font-size: 38px;
            font-weight: 700;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .stat .cap {
            font-size: 12px;
            opacity: 0.55;
            margin-top: 8px;
        }

        .winner {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 18px;
            padding: 14px;
            border-radius: 14px;
            background: rgba(47, 158, 126, 0.15);
            border: 1px solid rgba(47, 158, 126, 0.4);
        }

        /* split divider for 2P */
        #divider {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 2px;
            background: rgba(245, 241, 232, 0.25);
            z-index: 3;
            transform: translateX(-1px);
            pointer-events: none;
        }

        #pLabels {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            z-index: 4;
            display: flex;
            justify-content: space-between;
            padding: 0 26px;
            pointer-events: none;
            transform: translateY(-50%);
        }

        #pLabels span {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.1em;
            opacity: 0.4;
        }

        #status {
            position: absolute;
            bottom: calc(env(safe-area-inset-bottom, 18px) + 60px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            font-size: 13px;
            opacity: 0.5;
            white-space: nowrap;
        }

        /* countdown */
        #countdown {
            position: absolute;
            inset: 0;
            z-index: 15;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 120px;
            font-weight: 700;
            color: var(--paper);
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .hidden {
            display: none !important;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
            }
        }
    </style>
</head>

<body>
    <div id="stage">
        <video id="cam" playsinline autoplay muted></video>
        <canvas id="canvas"></canvas>
        <div id="divider" class="hidden"></div>
        <div id="pLabels" class="hidden"><span>ผู้เล่น 1</span><span>ผู้เล่น 2</span></div>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="panel" id="hudLeft">
                <div class="label" id="hudLeftLabel">คะแนน</div>
                <div class="value" id="hudLeftVal">0</div>
            </div>
            <div class="panel center">
                <div class="label">เวลา</div>
                <div class="value" id="hudTime">0:00</div>
            </div>
            <div class="panel" id="hudRight" style="text-align:right">
                <div class="label" id="hudRightLabel">เอื้อมถึง</div>
                <div class="value" id="hudRightVal">0</div>
            </div>
        </div>

        <div id="ctrlBtns" class="hidden">
            <button class="ctrl finish" id="btnFinish">เสร็จ</button>
            <button class="ctrl cancel" id="btnCancel">ยกเลิก</button>
        </div>

        <div id="status" class="hidden"></div>
        <div id="countdown"></div>

        <!-- MENU -->
        <div id="menu" class="screen">
            <div class="screen-inner">
                <h1>เกมฝึกการเคลื่อนไหว</h1>
                <p class="subtitle">เอื้อมมือไปแตะเป้าหมายบนจอ ผ่านกล้อง iPad</p>

                <div class="group">
                    <div class="glabel">โหมดเกม</div>
                    <div class="opts" id="modeOpts">
                        <button class="opt active"
                            data-mode="reach">แตะลูกบอล<small>เอื้อมแตะเป้าที่ลอยมา</small></button>
                        <button class="opt" data-mode="color2">2 สี<small>เขียวได้ แดงเสีย</small></button>
                        <button class="opt" data-mode="pick">เลือกสี<small>แตะตามสีที่สั่ง</small></button>
                    </div>
                </div>

                <div class="group">
                    <div class="glabel">ระดับความยาก</div>
                    <div class="opts" id="diffOpts">
                        <button class="opt active" data-diff="easy">ง่าย<small>เป้าใหญ่ ใกล้</small></button>
                        <button class="opt" data-diff="medium">ปานกลาง<small>เป้าเล็กลง</small></button>
                        <button class="opt" data-diff="hard">ยาก<small>ไกล + 2 มือ</small></button>
                    </div>
                </div>

                <div class="group">
                    <div class="glabel">จำนวนผู้เล่น</div>
                    <div class="opts" id="playerOpts">
                        <button class="opt active" data-players="1">1 คน<small>ฝึกเดี่ยว</small></button>
                        <button class="opt" data-players="2">2 คนแข่งกัน<small>แบ่งซ้าย-ขวา</small></button>
                    </div>
                </div>

                <div class="group">
                    <div class="glabel">ตั้งเวลา</div>
                    <div class="timeRow">
                        <input type="range" id="timeRange" min="15" max="180" step="15" value="60">
                        <div class="tval"><span id="timeDisplay">1:00</span></div>
                    </div>
                </div>

                <div class="group">
                    <div class="glabel">เวลาต่อลูก</div>
                    <div class="timeRow">
                        <input type="range" id="ballRange" min="2" max="11" step="1" value="11">
                        <div class="tval"><span id="ballDisplay">ไม่จำกัด</span></div>
                    </div>
                </div>

                <button class="bigBtn" id="btnStart">เริ่มเล่น</button>
            </div>
        </div>

        <!-- SUMMARY -->
        <div id="summary" class="screen hidden">
            <div class="screen-inner">
                <h1>สรุปผล</h1>
                <p class="subtitle" id="sumSubtitle"></p>
                <div id="sumWinner" class="winner hidden"></div>
                <div class="stat-grid" id="sumStats"></div>
                <button class="bigBtn" id="btnAgain">เล่นอีกครั้ง</button>
                <button class="bigBtn secondary" id="btnMenu">กลับเมนู</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

        // ---------- elements ----------
        const $ = id => document.getElementById(id);
        const video = $("cam"), canvas = $("canvas"), ctx = canvas.getContext("2d");
        const menu = $("menu"), summary = $("summary"), hud = $("hud"), ctrlBtns = $("ctrlBtns");
        const statusEl = $("status"), countdownEl = $("countdown");
        const divider = $("divider"), pLabels = $("pLabels");

        // ---------- config state ----------
        // ballTimeTouched: true เมื่อผู้ใช้ปรับ "เวลาต่อลูก" เอง (override ค่า life ตามความยาก)
        const config = { mode: "reach", diff: "easy", players: 1, time: 60, ballTimeTouched: false };

        const DIFF = {
            easy: { r: 0.085, margin: 0.16, life: 0, twoHandChance: 0 },
            medium: { r: 0.06, margin: 0.14, life: 4000, twoHandChance: 0 },
            hard: { r: 0.05, margin: 0.10, life: 3000, twoHandChance: 0.3 },
        };

        // ช่วง "ปลอดการชน" หลัง spawn (มิลลิวินาที) กันคะแนนเฟ้อจากนิ้วที่ค้างอยู่ที่เดิม
        const SPAWN_SAFE_MS = 300;

        // ---------- menu interactions ----------
        function wireOpts(containerId, key, cast = v => v, onChange = null) {
            $(containerId).addEventListener("click", e => {
                const btn = e.target.closest(".opt"); if (!btn) return;
                [...$(containerId).children].forEach(c => c.classList.remove("active"));
                btn.classList.add("active");
                config[key] = cast(btn.dataset[key]);
                if (onChange) onChange();
            });
        }
        wireOpts("modeOpts", "mode");
        // เมื่อเปลี่ยนความยาก ให้ "เวลาต่อลูก" ตามค่า default ของความยากนั้น (ถ้าผู้ใช้ยังไม่ override)
        wireOpts("diffOpts", "diff", v => v, () => syncBallDefault());
        wireOpts("playerOpts", "players", v => parseInt(v));

        const timeRange = $("timeRange"), timeDisplay = $("timeDisplay");
        function fmtTime(s) { const m = Math.floor(s / 60), ss = s % 60; return m + ":" + String(ss).padStart(2, "0"); }
        timeRange.addEventListener("input", () => { config.time = parseInt(timeRange.value); timeDisplay.textContent = fmtTime(config.time); });

        // ---------- เวลาต่อลูก (per-ball countdown) ----------
        // slider 2..11 : ค่า 2-10 = วินาที, ค่า 11 = "ไม่จำกัด"
        const ballRange = $("ballRange"), ballDisplay = $("ballDisplay");
        function fmtBall(v) { return v > 10 ? "ไม่จำกัด" : v + '<small> วิ</small>'; }
        // sync ค่าแสดงผลให้ตรงกับ default ของความยาก (ใช้เมื่อผู้ใช้ยังไม่แตะ slider เอง)
        function syncBallDefault() {
            if (config.ballTimeTouched) return;
            const life = DIFF[config.diff].life;
            const v = life === 0 ? 11 : Math.round(life / 1000);
            ballRange.value = v; ballDisplay.innerHTML = fmtBall(v);
        }
        ballRange.addEventListener("input", () => {
            config.ballTimeTouched = true; // ผู้ใช้ override แล้ว
            ballDisplay.innerHTML = fmtBall(parseInt(ballRange.value));
        });
        syncBallDefault(); // ตั้งค่าเริ่มต้นตามความยาก default (easy = ไม่จำกัด)

        // คืนค่า life (ms) ที่ใช้จริง: ถ้าผู้ใช้ override ใช้ค่าจาก slider, ไม่งั้นใช้ค่าตามความยาก
        function effectiveLife() {
            if (config.ballTimeTouched) {
                const v = parseInt(ballRange.value);
                return v > 10 ? 0 : v * 1000;
            }
            return DIFF[config.diff].life;
        }

        // ---------- mediapipe ----------
        let handLandmarker = null;
        let visionFileset = null;     // cache wasm fileset (โหลดครั้งเดียว)
        let currentNumHands = 0;      // numHands ที่ landmarker ปัจจุบันใช้อยู่
        const TIPS = [4, 8, 12, 16, 20];
        const BONES = [[0, 1], [1, 2], [2, 3], [3, 4], [0, 5], [5, 6], [6, 7], [7, 8], [5, 9], [9, 10], [10, 11], [11, 12], [9, 13], [13, 14], [14, 15], [15, 16], [13, 17], [17, 18], [18, 19], [19, 20], [0, 17]];
        const PALETTE = { green: "#2f9e7e", red: "#d64545", blue: "#4a7fd6", amber: "#e0a93d" };

        // สร้าง landmarker ตาม numHands ที่โหมดต้องการ (1 คน = 2 มือ, 2 คน = 4 มือ)
        // ถ้าค่าเดิมซ้ำก็ใช้ของเดิม (cache) ไม่สร้างใหม่
        async function ensureModel(numHands) {
            if (handLandmarker && currentNumHands === numHands) return;
            statusEl.classList.remove("hidden");
            statusEl.textContent = "กำลังโหลดระบบตรวจจับมือ…";
            if (!visionFileset) {
                visionFileset = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
            }
            // ปิด landmarker เดิมก่อนสร้างใหม่ เพื่อเลี่ยง memory leak เมื่อเปลี่ยน numHands
            if (handLandmarker) { try { handLandmarker.close(); } catch (e) { } handLandmarker = null; }
            handLandmarker = await HandLandmarker.createFromOptions(visionFileset, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numHands,
            });
            currentNumHands = numHands;
        }
        async function ensureCamera() {
            if (video.srcObject) return;
            statusEl.textContent = "กำลังขอสิทธิ์เข้าถึงกล้อง…";
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false });
            video.srcObject = stream; await video.play();
        }
        function resize() { canvas.width = canvas.clientWidth * devicePixelRatio; canvas.height = canvas.clientHeight * devicePixelRatio; }
        window.addEventListener("resize", resize);

        // ---------- game state ----------
        let game = null;
        let lastVideoTime = -1;

        function makeTarget(side) {
            // side: null=full screen, 'L'=left half, 'R'=right half
            const d = DIFF[config.diff];
            let xMin = d.margin, xMax = 1 - d.margin;
            if (side === "L") { xMin = d.margin; xMax = 0.5 - 0.04; }
            if (side === "R") { xMin = 0.5 + 0.04; xMax = 1 - d.margin; }

            let color = "green", scoring = "good";
            if (config.mode === "color2") {
                color = Math.random() < 0.5 ? "green" : "red";
                scoring = color === "green" ? "good" : "bad";
            }
            const twoHand = config.mode === "reach" && Math.random() < d.twoHandChance;

            return {
                x: xMin + Math.random() * (xMax - xMin),
                y: d.margin + Math.random() * (1 - d.margin * 2),
                r: d.r, color, scoring, twoHand,
                side, born: performance.now(), hit: false, pop: 0, touchedBy: new Set(),
                // life: เวลาต่อลูก (ms) ที่ใช้จริง, 0 = ไม่จำกัด
                life: effectiveLife(),
                // armed: จะนับการแตะได้ก็ต่อเมื่อบริเวณลูกปลอดนิ้วมาก่อน (กันนับซ้ำจากนิ้วที่ค้าง)
                armed: false,
            };
        }

        // "pick" mode: spawn 4 targets, one matching commanded color
        function makePickSet(side) {
            const d = DIFF[config.diff];
            const colors = ["green", "red", "blue", "amber"];
            const target = colors[Math.floor(Math.random() * 4)];
            let xMin = d.margin, xMax = 1 - d.margin;
            if (side === "L") { xMax = 0.5 - 0.04; }
            if (side === "R") { xMin = 0.5 + 0.04; }
            // 4 positions in a loose grid within the region
            const positions = [];
            const shuffled = [...colors].sort(() => Math.random() - 0.5);
            for (let i = 0; i < 4; i++) {
                positions.push({
                    x: xMin + (0.2 + 0.6 * ((i % 2))) * (xMax - xMin),
                    y: d.margin + (0.25 + 0.5 * (i < 2 ? 0 : 1)) * (1 - d.margin * 2),
                    color: shuffled[i],
                });
            }
            return {
                command: target, balls: positions.map(p => ({ ...p, r: d.r })), side, resolved: false,
                // born/life/armed: ใช้กลไกเดียวกับโหมดลูกบอล (ปลอดการชน + วงแหวนเวลา)
                born: performance.now(), life: effectiveLife(), armed: false,
            };
        }

        function startGame() {
            resize();
            const players = config.players;
            game = {
                running: true, startTime: performance.now(), duration: config.time * 1000,
                players,
                // per-player stats
                p: [
                    { score: 0, reach: 0, miss: 0 },
                    { score: 0, reach: 0, miss: 0 },
                ],
                targets: [], pickSets: [],
            };

            // spawn initial
            if (config.mode === "pick") {
                if (players === 2) { game.pickSets = [makePickSet("L"), makePickSet("R")]; }
                else { game.pickSets = [makePickSet(null)]; }
            } else {
                if (players === 2) { game.targets = [makeTarget("L"), makeTarget("R")]; }
                else { game.targets = [makeTarget(null)]; }
            }

            // UI
            menu.classList.add("hidden"); summary.classList.add("hidden");
            hud.classList.remove("hidden"); ctrlBtns.classList.remove("hidden");
            const is2P = players === 2;
            divider.classList.toggle("hidden", !is2P);
            pLabels.classList.toggle("hidden", !is2P);
            setupHudLabels();
            statusEl.classList.add("hidden");

            requestAnimationFrame(loop);
        }

        function setupHudLabels() {
            if (game.players === 2) {
                $("hudLeftLabel").textContent = "ผู้เล่น 1";
                $("hudRightLabel").textContent = "ผู้เล่น 2";
                $("hudLeftVal").className = "value p1";
                $("hudRightVal").className = "value p2";
            } else {
                $("hudLeftLabel").textContent = "คะแนน";
                $("hudRightLabel").textContent = "เอื้อมถึง";
                $("hudLeftVal").className = "value";
                $("hudRightVal").className = "value";
            }
            updateHud();
        }

        function updateHud() {
            if (game.players === 2) {
                $("hudLeftVal").textContent = game.p[0].score;
                $("hudRightVal").textContent = game.p[1].score;
            } else {
                $("hudLeftVal").textContent = game.p[0].score;
                $("hudRightVal").innerHTML = game.p[0].reach + '<small> ครั้ง</small>';
            }
        }

        // ---------- countdown then start ----------
        async function beginWithCountdown() {
            try {
                // จับมือเท่าที่โหมดต้องการ: 2 คน = 4 มือ, 1 คน = 2 มือ (ลดภาระเครื่อง)
                await ensureModel(config.players === 2 ? 4 : 2);
                await ensureCamera();
            } catch (err) {
                statusEl.classList.remove("hidden");
                statusEl.textContent = "เปิดกล้องไม่ได้ — โปรดอนุญาตการเข้าถึงกล้องแล้วลองใหม่";
                console.error(err); return;
            }
            countdownEl.style.display = "flex";
            for (const n of ["3", "2", "1", "เริ่ม!"]) {
                countdownEl.textContent = n;
                await new Promise(r => setTimeout(r, 700));
            }
            countdownEl.style.display = "none";
            startGame();
        }

        // ---------- main loop ----------
        function loop() {
            if (!game || !game.running) return;
            const W = canvas.width, H = canvas.height, scale = Math.min(W, H);
            ctx.clearRect(0, 0, W, H);

            // time
            const elapsed = performance.now() - game.startTime;
            const remain = Math.max(0, game.duration - elapsed);
            const remainSec = Math.ceil(remain / 1000);
            const timeEl = $("hudTime");
            timeEl.textContent = fmtTime(remainSec);
            timeEl.className = remainSec <= 10 ? "value warn" : "value";
            if (remain <= 0) { endGame(); return; }

            // ตรวจจับมือ "เฉพาะเมื่อเฟรมกล้องอัปเดตจริง" เท่านั้น (newFrame)
            // ถ้าเฟรมกล้องยังไม่เปลี่ยน เราจะวาดต่อด้วยโครงมือเดิมได้ แต่จะไม่ประมวลผลการชน
            // ด้วยตำแหน่งเก่า เพื่อกันอาการหน่วงและกันคะแนนเฟ้อจากข้อมูลค้าง
            let newFrame = false;
            if (handLandmarker && video.readyState >= 2 && video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const res = handLandmarker.detectForVideo(video, performance.now());
                game._lastHands = res.landmarks || [];
                newFrame = true;
            }
            const hands = game._lastHands || []; // โครงมือล่าสุด (ใช้สำหรับวาดให้ลื่นต่อเนื่อง)

            // collect fingertip points (in pixel space) — ใช้ตรวจการชนเฉพาะเฟรมที่ตรวจจับใหม่
            const tips = [];
            if (newFrame) {
                for (const lm of hands) {
                    for (const i of TIPS) tips.push({ x: lm[i].x * W, y: lm[i].y * H, lm, idx: i });
                }
            }

            // ----- render + logic by mode -----
            // newFrame บอกว่าเฟรมนี้มีข้อมูลมือสด ๆ ให้ประมวลผลการชน/arm หรือไม่
            if (config.mode === "pick") updatePickMode(W, H, scale, tips, newFrame);
            else updateBallMode(W, H, scale, tips, newFrame);

            // draw hands on top
            drawHands(W, H, hands);

            // pick-mode command banner
            if (config.mode === "pick") drawPickCommand(W, H);

            updateHud();
            requestAnimationFrame(loop);
        }

        function whichPlayer(px, W) {
            // for 2P: left half = player 1, right half = player 2
            // NOTE: canvas is mirrored via CSS, but coordinates are in unmirrored video space.
            // The visual left (player 1) corresponds to x > 0.5 in raw coords because of mirror.
            // We map by raw x: raw x<0.5 shows on right visually. To keep "visual left = P1",
            // player 1 = raw x > 0.5.
            return px > W / 2 ? 0 : 1;
        }

        function updateBallMode(W, H, scale, tips, newFrame) {
            for (const t of game.targets) {
                const tx = t.x * W, ty = t.y * H, tr = t.r * scale;
                const age = performance.now() - t.born;

                // expire เมื่อมีลิมิตเวลา (life > 0) และยังไม่ถูกแตะ
                if (!t.hit && t.life > 0 && age > t.life) {
                    // นับ "พลาด (miss)" ให้ผู้เล่นเจ้าของลูก (เดี่ยว=ผู้เล่น 0, สองคนแยกตาม side)
                    // เฉพาะลูกที่ "ควรแตะ" (good) — ลูกแดง (bad) ที่หมดเวลาคือการหลบถูกต้อง ไม่นับพลาด
                    if (t.scoring !== "bad") {
                        const owner = t.side === "R" ? 1 : 0;
                        game.p[owner].miss += 1;
                    }
                    respawn(t);
                    continue;
                }

                if (t.hit) {
                    t.pop += 0.08;
                    const pr = tr * (1 + t.pop * 1.8);
                    ctx.globalAlpha = Math.max(0, 1 - t.pop);
                    ctx.beginPath(); ctx.arc(tx, ty, pr, 0, Math.PI * 2);
                    ctx.strokeStyle = t.scoring === "bad" ? PALETTE.red : PALETTE.green;
                    ctx.lineWidth = 6 * devicePixelRatio; ctx.stroke();
                    ctx.globalAlpha = 1;
                    if (t.pop >= 1) respawn(t);
                    continue;
                }

                // draw ball
                drawBall(tx, ty, tr, t.color, age);
                // วงแหวนนับถอยหลัง (เฉพาะเมื่อมีลิมิตเวลา — "ไม่จำกัด" ไม่ต้องวาด)
                if (t.life > 0) drawCountdownRing(tx, ty, tr, Math.max(0, 1 - age / t.life), t.color);
                if (t.twoHand) drawTwoHandBadge(tx, ty, tr);

                // ----- collision / arming (เฉพาะเฟรมที่มีข้อมูลมือสด) -----
                if (!newFrame) continue;
                const touching = tips.filter(tp => Math.hypot(tp.x - tx, tp.y - ty) < tr + 12 * devicePixelRatio);
                // arm: ต้องรอให้บริเวณลูกปลอดนิ้ว + พ้นช่วงปลอดการชนหลัง spawn ก่อน จึงเริ่มนับการแตะได้
                // กันคะแนนเฟ้อจากนิ้วที่ยังค้างอยู่ที่เดิมตอนลูกใหม่ถูกสุ่มมา
                if (!t.armed) {
                    if (age > SPAWN_SAFE_MS && touching.length === 0) t.armed = true;
                    continue;
                }
                if (touching.length > 0) {
                    if (t.twoHand) {
                        // need 2 distinct hands touching
                        const handsTouching = new Set(touching.map(tp => tp.lm));
                        if (handsTouching.size >= 2) registerHit(t);
                    } else {
                        registerHit(t);
                    }
                }
            }
        }

        function registerHit(t) {
            t.hit = true;
            const owner = t.side === "L" ? 0 : t.side === "R" ? 1 : 0;
            if (t.scoring === "bad") {
                game.p[owner].score = Math.max(0, game.p[owner].score - 10);
                game.p[owner].miss += 1;
            } else {
                game.p[owner].score += 10;
                game.p[owner].reach += 1;
            }
            if (navigator.vibrate) navigator.vibrate(t.scoring === "bad" ? [30, 30, 30] : 40);
        }

        function respawn(t) {
            const fresh = makeTarget(t.side);
            Object.assign(t, fresh);
        }

        function updatePickMode(W, H, scale, tips, newFrame) {
            for (const set of game.pickSets) {
                if (set.resolved) { Object.assign(set, makePickSet(set.side)); continue; }
                const age = performance.now() - set.born;
                const owner = set.side === "R" ? 1 : 0;

                // expire ทั้งชุดเมื่อมีลิมิตเวลาและยังไม่แตะ → นับพลาดให้เจ้าของ แล้วสุ่มชุดใหม่
                if (set.life > 0 && age > set.life) {
                    game.p[owner].miss += 1;
                    Object.assign(set, makePickSet(set.side));
                    continue;
                }

                // วาดลูกทุกใบ + วงแหวนเวลา และเก็บว่ามีนิ้วจ่อใบไหนอยู่บ้าง
                let hitBall = null, anyTouch = false;
                for (const b of set.balls) {
                    const bx = b.x * W, by = b.y * H, br = b.r * scale;
                    drawBall(bx, by, br, b.color, performance.now());
                    if (set.life > 0) drawCountdownRing(bx, by, br, Math.max(0, 1 - age / set.life), b.color);
                    if (newFrame && tips.some(tp => Math.hypot(tp.x - bx, tp.y - by) < br + 12 * devicePixelRatio)) {
                        anyTouch = true; if (!hitBall) hitBall = b;
                    }
                }

                // ประมวลผลการชนเฉพาะเฟรมที่มีข้อมูลมือสด
                if (!newFrame) continue;
                // arm: รอให้บริเวณชุดปลอดนิ้ว + พ้นช่วงปลอดการชน ก่อนเริ่มนับ
                // กันโดนนับทันทีเมื่อชุดใหม่โผล่ตรงตำแหน่งที่นิ้วยังค้างอยู่
                if (!set.armed) {
                    if (age > SPAWN_SAFE_MS && !anyTouch) set.armed = true;
                    continue;
                }
                if (hitBall) {
                    if (hitBall.color === set.command) { game.p[owner].score += 10; game.p[owner].reach += 1; if (navigator.vibrate) navigator.vibrate(40); }
                    else { game.p[owner].score = Math.max(0, game.p[owner].score - 10); game.p[owner].miss += 1; if (navigator.vibrate) navigator.vibrate([30, 30, 30]); }
                    set.resolved = true;
                }
            }
        }

        const COLOR_TH = { green: "เขียว", red: "แดง", blue: "น้ำเงิน", amber: "เหลือง" };
        function drawPickCommand(W, H) {
            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0); // unmirror for upright text
            for (const set of game.pickSets) {
                // raw side L (x<0.5 raw) shows on the RIGHT visually due to mirror, and vice versa.
                // Place banner above that player's region in VISUAL space.
                let visCx;
                if (set.side === null) visCx = W * 0.5;
                else if (set.side === "L") visCx = W * 0.75; // raw-left shows visual-right
                else visCx = W * 0.25;

                const y = H * 0.12;
                const txt = "แตะสี " + (COLOR_TH[set.command] || set.command);
                ctx.font = `bold ${Math.round(W * 0.028)}px ui-rounded, "Noto Sans Thai", sans-serif`;
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                const padX = W * 0.018, w = ctx.measureText(txt).width + padX * 2, h = W * 0.045;
                // pill bg
                ctx.fillStyle = "rgba(15,27,45,0.75)";
                roundRect(ctx, visCx - w / 2, y - h / 2, w, h, h / 2); ctx.fill();
                // swatch
                ctx.beginPath();
                ctx.arc(visCx - w / 2 + h * 0.55, y, h * 0.28, 0, Math.PI * 2);
                ctx.fillStyle = PALETTE[set.command]; ctx.fill();
                // text
                ctx.fillStyle = "#f5f1e8";
                ctx.fillText(txt, visCx + h * 0.3, y);
            }
            ctx.restore();
        }
        function roundRect(c, x, y, w, h, r) {
            c.beginPath(); c.moveTo(x + r, y);
            c.arcTo(x + w, y, x + w, y + h, r); c.arcTo(x + w, y + h, x, y + h, r);
            c.arcTo(x, y + h, x, y, r); c.arcTo(x, y, x + w, y, r); c.closePath();
        }

        // ---------- drawing helpers ----------
        function drawBall(x, y, r, colorKey, age) {
            const breathe = 1 + Math.sin(age / 1000 * 3) * 0.06;
            const base = PALETTE[colorKey] || PALETTE.green;
            // outer ring
            ctx.beginPath(); ctx.arc(x, y, r * breathe * 1.35, 0, Math.PI * 2);
            ctx.strokeStyle = hexA(base, 0.4); ctx.lineWidth = 3 * devicePixelRatio; ctx.stroke();
            // core gradient
            const g = ctx.createRadialGradient(x, y - r * 0.3, r * 0.2, x, y, r);
            g.addColorStop(0, lighten(base)); g.addColorStop(1, base);
            ctx.beginPath(); ctx.arc(x, y, r * breathe, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
        }
        // วงแหวนนับถอยหลังรอบลูก: เริ่มเต็มวง (frac=1) แล้วค่อย ๆ ลดมุมลงจนหมด (frac=0)
        function drawCountdownRing(x, y, r, frac, colorKey) {
            const rr = r * 1.55; // อยู่นอกวง outer ring ของลูก
            ctx.lineWidth = 4 * devicePixelRatio;
            // track จาง ๆ กลมกลืนกับธีม paper
            ctx.beginPath(); ctx.arc(x, y, rr, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(245,241,232,0.12)"; ctx.stroke();
            // ส่วนเวลาที่เหลือ เริ่มจากด้านบน (-90°) กวาดตามเข็มลดลงเรื่อย ๆ
            const start = -Math.PI / 2, end = start + Math.PI * 2 * frac;
            ctx.beginPath(); ctx.arc(x, y, rr, start, end);
            // เหลือเวลาน้อย (<30%) เปลี่ยนเป็นสีเหลืองอำพันเตือน
            ctx.strokeStyle = frac < 0.3 ? PALETTE.amber : (PALETTE[colorKey] || PALETTE.green);
            ctx.lineCap = "round"; ctx.stroke(); ctx.lineCap = "butt";
        }
        function drawTwoHandBadge(x, y, r) {
            ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0);
            const sx = canvas.width - x; // mirror x for upright text
            ctx.font = `${Math.round(r * 0.6)}px ui-rounded, sans-serif`;
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillStyle = "rgba(245,241,232,0.95)";
            ctx.fillText("✋✋", sx, y);
            ctx.restore();
        }
        function drawHands(W, H, hands) {
            for (const lm of hands) {
                ctx.strokeStyle = "rgba(245,241,232,0.35)"; ctx.lineWidth = 2 * devicePixelRatio;
                for (const [a, b] of BONES) { ctx.beginPath(); ctx.moveTo(lm[a].x * W, lm[a].y * H); ctx.lineTo(lm[b].x * W, lm[b].y * H); ctx.stroke(); }
                for (const i of TIPS) {
                    ctx.beginPath(); ctx.arc(lm[i].x * W, lm[i].y * H, 8 * devicePixelRatio, 0, Math.PI * 2);
                    ctx.fillStyle = i === 8 ? "#f5f1e8" : "rgba(245,241,232,0.7)"; ctx.fill();
                }
            }
        }
        function hexA(hex, a) { const n = parseInt(hex.slice(1), 16); return `rgba(${n >> 16 & 255},${n >> 8 & 255},${n & 255},${a})`; }
        function lighten(hex) { const n = parseInt(hex.slice(1), 16); const r = Math.min(255, (n >> 16 & 255) + 60), g = Math.min(255, (n >> 8 & 255) + 60), b = Math.min(255, (n & 255) + 60); return `rgb(${r},${g},${b})`; }

        // ---------- end / summary ----------
        function endGame() {
            if (!game) return;
            game.running = false;
            hud.classList.add("hidden"); ctrlBtns.classList.add("hidden");
            divider.classList.add("hidden"); pLabels.classList.add("hidden");

            const dur = Math.round((Math.min(performance.now() - game.startTime, game.duration)) / 1000);
            const sumStats = $("sumStats"), sumWinner = $("sumWinner"), sumSubtitle = $("sumSubtitle");

            if (game.players === 2) {
                const a = game.p[0], b = game.p[1];
                sumSubtitle.textContent = `เล่นไป ${fmtTime(dur)} นาที`;
                sumWinner.classList.remove("hidden");
                if (a.score > b.score) sumWinner.textContent = "🏆 ผู้เล่น 1 ชนะ!";
                else if (b.score > a.score) sumWinner.textContent = "🏆 ผู้เล่น 2 ชนะ!";
                else sumWinner.textContent = "เสมอกัน!";
                sumStats.innerHTML = `
      <div class="stat"><div class="num" style="color:var(--green-soft)">${a.score}</div><div class="cap">ผู้เล่น 1 · เอื้อม ${a.reach} ครั้ง</div></div>
      <div class="stat"><div class="num" style="color:var(--pulse-soft)">${b.score}</div><div class="cap">ผู้เล่น 2 · เอื้อม ${b.reach} ครั้ง</div></div>`;
            } else {
                const a = game.p[0];
                sumWinner.classList.add("hidden");
                sumSubtitle.textContent = `เล่นไป ${fmtTime(dur)} นาที`;
                const accuracy = (a.reach + a.miss) > 0 ? Math.round(a.reach / (a.reach + a.miss) * 100) : 100;
                sumStats.innerHTML = `
      <div class="stat"><div class="num">${a.score}</div><div class="cap">คะแนนรวม</div></div>
      <div class="stat"><div class="num">${a.reach}</div><div class="cap">เอื้อมถึง (ครั้ง)</div></div>
      <div class="stat"><div class="num">${(a.reach / Math.max(dur, 1) * 60).toFixed(0)}</div><div class="cap">ครั้ง/นาที</div></div>
      <div class="stat"><div class="num">${accuracy}%</div><div class="cap">ความแม่นยำ</div></div>`;
            }
            summary.classList.remove("hidden");
        }

        // ---------- controls ----------
        $("btnStart").addEventListener("click", () => { $("btnStart").disabled = true; beginWithCountdown().finally(() => $("btnStart").disabled = false); });
        $("btnFinish").addEventListener("click", endGame);
        $("btnCancel").addEventListener("click", () => {
            game.running = false;
            hud.classList.add("hidden"); ctrlBtns.classList.add("hidden");
            divider.classList.add("hidden"); pLabels.classList.add("hidden");
            menu.classList.remove("hidden");
        });
        $("btnAgain").addEventListener("click", () => { summary.classList.add("hidden"); beginWithCountdown(); });
        $("btnMenu").addEventListener("click", () => { summary.classList.add("hidden"); menu.classList.remove("hidden"); });
    </script>
</body>

</html>
